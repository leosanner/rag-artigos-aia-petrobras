services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aia-insight-postgres
    environment:
      POSTGRES_DB: aia_insight
      POSTGRES_USER: aia_insight
      POSTGRES_PASSWORD: aia_insight
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aia_insight -d aia_insight"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
